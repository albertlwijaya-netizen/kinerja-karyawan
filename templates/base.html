<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Kinerja</title>
    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <i class="bi bi-rocket-takeoff-fill"></i>
            <span>E-Performance</span>
        </div>
        <nav class="nav flex-column">
            <a class="nav-link {{ 'active' if request.path == '/admin/dashboard' or request.path == '/karyawan/dashboard' }}" 
               href="{{ url_for('admin_dashboard' if session['role'] == 'Admin' else 'karyawan_dashboard') }}">
                <i class="bi bi-grid-1x2-fill"></i> Dashboard
            </a>
            
            {% if session['role'] == 'Admin' %}
            <a class="nav-link {{ 'active' if '/admin/karyawan' in request.path }}" href="/admin/karyawan">
                <i class="bi bi-people-fill"></i> Karyawan
            </a>
            <a class="nav-link {{ 'active' if '/admin/divisi' in request.path }}" href="/admin/divisi">
                <i class="bi bi-building-fill"></i> Divisi
            </a>
            <a class="nav-link {{ 'active' if '/admin/penilaian' in request.path }}" href="/admin/penilaian">
                <i class="bi bi-star-fill"></i> Penilaian
            </a>
            {% else %}
            <a class="nav-link {{ 'active' if '/karyawan/aktivitas' in request.path }}" href="/karyawan/aktivitas">
                <i class="bi bi-journal-check"></i> Aktivitas
            </a>
            {% endif %}
            
            <div class="mt-5 pt-5">
                <a class="nav-link text-danger" href="/logout">
                    <i class="bi bi-box-arrow-left"></i> Logout
                </a>
            </div>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Navbar -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold">Selamat Datang, <span class="text-primary">{{ session['username'] }}</span></h4>
            <div class="badge bg-white text-dark shadow-sm p-2 px-3 border rounded-pill">
                <i class="bi bi-person-circle me-2 text-primary"></i> {{ session['role'] }}
            </div>
        </div>

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
